{% extends "base.html" %}

{% block title %}
Reschedule Consultation
{% endblock %}

{% block content %}
<div class="container mt-4">
    <h1 class="h3 mb-4">Reschedule Consultation</h1>
    <div class="card shadow">
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                <h4 class="mb-3">Consultation Details</h4>
                {{ form.as_p }}
                <div class="mt-4">
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                    <a href="{% url 'consultations:consultation_calendar' %}" class="btn btn-secondary">Cancel</a>
                    
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
