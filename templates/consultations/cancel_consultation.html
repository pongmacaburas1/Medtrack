{% extends "base.html" %}

{% block title %}
Cancel Consultation
{% endblock %}

{% block content %}
<div class="container mt-4">
    <h1 class="h3 mb-4">Cancel Consultation</h1>
    <div class="alert alert-warning">
        Are you sure you want to cancel the consultation with <strong>{{ consultation.physician }}</strong> on <strong>{{ consultation.consultation_date_date_only }}</strong>?
    </div>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, Cancel</button>
        <a href="{% url 'consultations:consultation_calendar' %}" class="btn btn-secondary">No, Go Back</a>
    </form>
</div>
{% endblock %}
