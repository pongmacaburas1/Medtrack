{% load static %}
<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Sent — MedTrack</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
    <style>
        :root {
            --emerald: #10b981;
            --emerald-dim: rgba(16,185,129,.15);
        }
        * { font-family: 'DM Sans', sans-serif; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0b1d3a 0%, #122347 100%);
        }
        .reset-card {
            width: 100%;
            max-width: 420px;
            border-radius: 1.25rem;
            padding: 2.5rem;
            background: rgba(255,255,255,.04);
            border: 1px solid rgba(255,255,255,.08);
            box-shadow: 0 20px 60px rgba(0,0,0,.3);
            text-align: center;
        }
        .success-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--emerald-dim);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 2.5rem;
            color: var(--emerald);
        }
        .reset-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: .75rem;
        }
        .reset-subtitle {
            font-size: .88rem;
            color: rgba(255,255,255,.5);
            margin-bottom: 1.75rem;
            line-height: 1.6;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: .4rem;
            font-size: .88rem;
            color: rgba(255,255,255,.5);
            text-decoration: none;
        }
        .back-link:hover { color: var(--emerald); }
        .logo-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: .5rem;
            margin-bottom: 1.5rem;
        }
        .logo-wrap img { height: 36px; }
        .logo-text { font-weight: 800; font-size: 1.1rem; color: var(--emerald); }
    </style>
</head>
<body>
    <div class="reset-card">
        <div class="logo-wrap">
            <img src="{% static 'img/logo.png' %}" alt="MedTrack">
            <span class="logo-text">MedTrack</span>
        </div>
        
        <div class="success-icon">
            <i class="bi bi-envelope-check"></i>
        </div>
        
        <h1 class="reset-title">Check Your Email</h1>
        <p class="reset-subtitle">
            We've sent password reset instructions to your email address. 
            Please check your inbox and follow the link to reset your password.
            <br><br>
            <strong style="color:rgba(255,255,255,.7);">Didn't receive the email?</strong><br>
            Check your spam folder or try again.
        </p>
        
        <a href="{% url 'pdl:login' %}" class="back-link">
            <i class="bi bi-arrow-left"></i> Back to Login
        </a>
    </div>
</body>
</html>
