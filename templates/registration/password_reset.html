{% load static %}
<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password — MedTrack</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
    <style>
        :root {
            --emerald: #10b981;
            --emerald-dim: rgba(16,185,129,.15);
            --emerald-border: rgba(16,185,129,.3);
        }
        * { font-family: 'DM Sans', sans-serif; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0b1d3a 0%, #122347 100%);
        }
        .reset-card {
            width: 100%;
            max-width: 420px;
            border-radius: 1.25rem;
            padding: 2.5rem;
            background: rgba(255,255,255,.04);
            border: 1px solid rgba(255,255,255,.08);
            box-shadow: 0 20px 60px rgba(0,0,0,.3);
        }
        .reset-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: .5rem;
        }
        .reset-subtitle {
            font-size: .88rem;
            color: rgba(255,255,255,.5);
            margin-bottom: 1.75rem;
        }
        .form-control {
            background: rgba(255,255,255,.05);
            border: 1px solid rgba(255,255,255,.1);
            color: #fff;
            padding: .75rem 1rem;
            border-radius: .75rem;
        }
        .form-control:focus {
            background: rgba(255,255,255,.08);
            border-color: var(--emerald);
            box-shadow: 0 0 0 .2rem rgba(16,185,129,.15);
            color: #fff;
        }
        .form-control::placeholder { color: rgba(255,255,255,.35); }
        .form-label { font-weight: 600; font-size: .85rem; margin-bottom: .4rem; }
        .btn-emerald {
            background: var(--emerald);
            color: #fff;
            font-weight: 700;
            padding: .75rem 1.5rem;
            border-radius: .75rem;
            border: none;
            width: 100%;
        }
        .btn-emerald:hover { background: #0d9668; color: #fff; }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: .4rem;
            font-size: .88rem;
            color: rgba(255,255,255,.5);
            text-decoration: none;
            margin-top: 1.25rem;
        }
        .back-link:hover { color: var(--emerald); }
        .logo-wrap {
            display: flex;
            align-items: center;
            gap: .5rem;
            margin-bottom: 1.5rem;
        }
        .logo-wrap img { height: 36px; }
        .logo-text { font-weight: 800; font-size: 1.1rem; color: var(--emerald); }
    </style>
</head>
<body>
    <div class="reset-card">
        <div class="logo-wrap">
            <img src="{% static 'img/logo.png' %}" alt="MedTrack">
            <span class="logo-text">MedTrack</span>
        </div>
        
        <h1 class="reset-title"><i class="bi bi-key me-2"></i>Reset Password</h1>
        <p class="reset-subtitle">Enter your email address and we'll send you instructions to reset your password.</p>
        
        <form method="post">
            {% csrf_token %}
            <div class="mb-4">
                <label class="form-label">Email Address</label>
                <input type="email" name="email" class="form-control" placeholder="Enter your registered email" required>
            </div>
            <button type="submit" class="btn btn-emerald">
                <i class="bi bi-envelope me-2"></i>Send Reset Link
            </button>
        </form>
        
        <div class="text-center">
            <a href="{% url 'pdl:login' %}" class="back-link">
                <i class="bi bi-arrow-left"></i> Back to Login
            </a>
        </div>
    </div>
</body>
</html>
