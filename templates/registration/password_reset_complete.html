{% load static %}
<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset Complete — MedTrack</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
    <style>
        :root {
            --emerald: #10b981;
            --emerald-dim: rgba(16,185,129,.15);
        }
        * { font-family: 'DM Sans', sans-serif; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0b1d3a 0%, #122347 100%);
        }
        .reset-card {
            width: 100%;
            max-width: 420px;
            border-radius: 1.25rem;
            padding: 2.5rem;
            background: rgba(255,255,255,.04);
            border: 1px solid rgba(255,255,255,.08);
            box-shadow: 0 20px 60px rgba(0,0,0,.3);
            text-align: center;
        }
        .success-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--emerald-dim);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 2.5rem;
            color: var(--emerald);
        }
        .reset-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: .75rem;
        }
        .reset-subtitle {
            font-size: .88rem;
            color: rgba(255,255,255,.5);
            margin-bottom: 1.75rem;
            line-height: 1.6;
        }
        .btn-login {
            display: inline-flex;
            align-items: center;
            gap: .5rem;
            padding: .85rem 2rem;
            border-radius: .625rem;
            background: var(--emerald);
            border: none;
            font-weight: 600;
            color: #fff;
            text-decoration: none;
        }
        .btn-login:hover { 
            background: #0ea271; 
            color: #fff;
        }
        .logo-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: .5rem;
            margin-bottom: 1.5rem;
        }
        .logo-wrap img { height: 36px; }
        .logo-text { font-weight: 800; font-size: 1.1rem; color: var(--emerald); }
    </style>
</head>
<body>
    <div class="reset-card">
        <div class="logo-wrap">
            <img src="{% static 'img/logo.png' %}" alt="MedTrack">
            <span class="logo-text">MedTrack</span>
        </div>
        
        <div class="success-icon">
            <i class="bi bi-check-circle"></i>
        </div>
        
        <h1 class="reset-title">Password Reset Complete</h1>
        <p class="reset-subtitle">
            Your password has been successfully reset. 
            You can now log in with your new password.
        </p>
        
        <a href="{% url 'pdl:login' %}" class="btn-login">
            <i class="bi bi-box-arrow-in-right"></i> Log In Now
        </a>
    </div>
</body>
</html>
